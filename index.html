<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/icon.svg" color="#e11d48" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="EM Handbook" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="EM Handbook — Emergency Medicine reference for Thai community hospital physicians" />
    <title>EM Handbook</title>
    <!--
      Plausible analytics (privacy-focused, no cookies, no PII).
      Only loads if VITE_PLAUSIBLE_DOMAIN env var is set.
      Self-host option available: https://plausible.io/docs/self-hosting
    -->
    <script>
      (function () {
        var domain = '%VITE_PLAUSIBLE_DOMAIN%';
        // Vite leaves the placeholder unchanged if the env var is unset
        if (!domain || domain.charAt(0) === '%') return;
        var s = document.createElement('script');
        s.defer = true;
        s.setAttribute('data-domain', domain);
        s.src = 'https://plausible.io/js/script.js';
        document.head.appendChild(s);
        window.plausible = window.plausible || function () {
          (window.plausible.q = window.plausible.q || []).push(arguments);
        };
      })();
    </script>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('em-handbook:theme');
          var pref = stored === 'light' || stored === 'dark' ? stored : 'system';
          var dark =
            pref === 'dark' ||
            (pref === 'system' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          var root = document.documentElement;
          if (dark) root.classList.add('dark');
          root.style.colorScheme = dark ? 'dark' : 'light';
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
